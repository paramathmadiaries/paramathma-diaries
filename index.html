<style>

/* MAIN COLORS */

:root{
--primary:#8b5cf6;
--secondary:#c084fc;
--dark:#0b0b12;
--glass:rgba(255,255,255,0.05);
}

body{
background:#05050a;
}

/* GLOW EFFECTS */

body::before{
background:#8b5cf6;
opacity:0.09;
}

body::after{
background:#c084fc;
opacity:0.07;
}

/* SCROLLBAR */

::-webkit-scrollbar-thumb{
background:var(--primary);
}

/* LOGO */

.logo{
color:var(--primary);
}

/* NAVBAR HOVER */

nav ul li a::after{
background:var(--primary);
}

nav ul li a:hover{
color:var(--primary);
}

/* MOBILE MENU */

.menu-btn{
color:var(--primary);
}

.mobile-menu a:hover{
color:var(--primary);
}

/* HERO */

.hero-tag{
border:1px solid rgba(139,92,246,0.45);
color:var(--primary);
background:rgba(139,92,246,0.06);
}

.hero-content h1 span{
color:var(--primary);
text-shadow:0 0 35px rgba(139,92,246,0.8);
}

/* BUTTONS */

.primary{
background:linear-gradient(135deg,#8b5cf6,#c084fc);
color:#fff;
box-shadow:0 0 35px rgba(139,92,246,0.45);
}

.primary:hover{
box-shadow:0 0 60px rgba(139,92,246,0.85);
}

.secondary{
border:2px solid var(--primary);
color:var(--primary);
}

.secondary:hover{
background:linear-gradient(135deg,#8b5cf6,#c084fc);
color:#fff;
}

/* FLOATING CARDS */

.float-card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(139,92,246,0.12);
box-shadow:0 0 35px rgba(139,92,246,0.08);
}

.float-card h3{
color:var(--primary);
}

/* SECTION TITLES */

.section-title span{
color:var(--primary);
}

/* STATS */

.stat-box{
border:1px solid rgba(139,92,246,0.08);
}

.stat-box:hover{
box-shadow:0 0 45px rgba(139,92,246,0.14);
}

.stat-box h2{
color:var(--primary);
}

/* WHY CARDS */

.why-card{
border:1px solid rgba(139,92,246,0.08);
}

.why-card:hover{
box-shadow:0 0 45px rgba(139,92,246,0.14);
}

.why-card i{
color:var(--primary);
}

/* EXPERIENCE */

.strip-overlay{
background:linear-gradient(transparent,rgba(8,8,14,0.96));
}

/* CTA */

.cta h2 span{
color:var(--primary);
}

/* FOOTER */

footer{
background:#08080d;
}

footer h2{
color:var(--primary);
}

/* WHATSAPP */

.whatsapp{
box-shadow:0 0 25px rgba(37,211,102,0.55);
}

/* EXTRA PREMIUM EFFECTS */

.float-card::before,
.why-card::before,
.stat-box::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(
135deg,
rgba(139,92,246,0.12),
transparent,
rgba(192,132,252,0.08)
);
opacity:0;
transition:0.5s;
pointer-events:none;
}

.float-card:hover::before,
.why-card:hover::before,
.stat-box:hover::before{
opacity:1;
}

/* HERO EXTRA GLOW */

.hero::after{
content:'';
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,rgba(139,92,246,0.18),transparent 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:1;
animation:pulseGlow 6s infinite ease-in-out;
}

/* NEW ANIMATION */

@keyframes pulseGlow{

0%,100%{
transform:translate(-50%,-50%) scale(1);
opacity:0.7;
}

50%{
transform:translate(-50%,-50%) scale(1.12);
opacity:1;
}

}

</style>
